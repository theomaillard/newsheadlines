name: run tests

on:
  pull_request:
    branches:
      - main
      
jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip install pytest
        pip install -e .

    - name: Run pytest
      run: pytest
